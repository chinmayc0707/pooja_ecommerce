<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Pooja Ecommerce</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --colors-primary: #FF5C00;
            --colors-primary-deep: #CC4A00;
            --colors-cream: #FFF9E5;
            --colors-beige-deep: #E5DCC3;
            --colors-canvas: #FFFFFF;
            --colors-ink: #1A1A1A;
            --colors-slate: #666666;
            --colors-on-dark: #FFFFFF;
            --rounded-md: 8px;
            --rounded-lg: 12px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background-color: #FF5C00; color: white; }
        ::-moz-selection { background-color: #FF5C00; color: white; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--colors-cream);
            color: var(--colors-ink);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        nav {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background-color: var(--colors-cream);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; text-decoration: none; color: var(--colors-ink); }
        .nav-links { list-style: none; display: flex; gap: 32px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--colors-ink); font-size: 14px; font-weight: 500; }

        .profile-card {
            background: var(--colors-canvas);
            padding: 48px;
            border-radius: var(--rounded-lg);
            box-shadow: 0 12px 24px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--colors-beige-deep);
            margin-top: 80px;
        }
        .profile-card h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            margin-bottom: 32px;
            text-align: center;
        }
        .form-group { margin-bottom: 24px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--colors-slate);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--colors-beige-deep);
            border-radius: var(--rounded-md);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .btn-update {
            width: 100%;
            background: var(--colors-primary);
            color: var(--colors-on-dark);
            padding: 14px;
            border-radius: var(--rounded-md);
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            margin-bottom: 16px;
        }
        .btn-update:hover { background: var(--colors-primary-deep); }

        .btn-logout {
            width: 100%;
            background: var(--colors-canvas);
            color: var(--colors-ink);
            padding: 14px;
            border-radius: var(--rounded-md);
            border: 1px solid var(--colors-beige-deep);
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .btn-logout:hover {
            background: #f3f4f6;
        }

        .success-msg {
            background: #dcfce7;
            color: #166534;
            padding: 12px;
            border-radius: var(--rounded-md);
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
        }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: var(--rounded-md);
            font-size: 13px;
            margin-bottom: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">POOJA ECOMMERCE_</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
        </ul>
    </nav>
    <div class="profile-card">
        <h1>Profile</h1>
        <p style="text-align: center; color: var(--colors-slate); margin-bottom: 24px; font-size: 14px;">Logged in as: <strong>{{ current_user.username }}</strong></p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="success-msg">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="current_password">Current Password</label>
                <input type="password" id="current_password" name="current_password" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required minlength="4">
            </div>
            <button type="submit" class="btn-update">Change Password</button>
        </form>
        <a href="/logout" class="btn-logout">Logout</a>
    </div>
</body>
</html>
